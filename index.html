<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamline AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter",sans-serif;background:#F8F8FA;color:#1d1d1f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.logo{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.logo span{color:#C9973A;}
.sub{font-size:12px;color:#86868b;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;}
.card{background:rgba(255,255,255,0.8);border:1px solid rgba(0,0,0,0.06);border-radius:16px;padding:24px 28px;width:100%;max-width:400px;text-decoration:none;color:#1d1d1f;transition:all 0.2s;display:block;margin-bottom:12px;}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.card-desc{font-size:13px;color:#86868b;}
.footer{margin-top:48px;font-size:11px;color:#aeaeb2;}
</style>
</head>
<body>
<div class="logo">Streamline<span>AI</span></div>
<div class="sub">Consulting</div>
<a href="/flip-analyzer/" class="card">
<div class="card-title">Flip Deal Analyzer</div>
<div class="card-desc">Automated comps, deal analysis, and Excel/PDF reports</div>
</a>
<div class="footer">streamlinedai.net</div>
</body>
</html>
